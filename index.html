<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Resume Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- Form Section -->
    <div class="form-section">
        <h2>Resume Builder</h2>
        <label>Profile Photo</label>
        <input type="file" id="photo" accept="image/*">
        
        <label>Name</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label>Phone</label>
        <input type="text" id="phone" placeholder="Enter your phone number">

        <label>Skills</label>
        <textarea id="skills" placeholder="HTML, CSS, JavaScript"></textarea>

        <label>Education</label>
        <textarea id="education" placeholder="Your education details"></textarea>

        <label>Experience</label>
        <textarea id="experience" placeholder="Your experience"></textarea>
    </div>

    <!-- Resume Preview Section -->
    <div class="resume-section">
        <img id="r-photo" src="" alt="Profile Photo">

        <h1 id="r-name">Your Name</h1>
        <p id="r-email">Email: example@email.com</p>
        <p id="r-phone">Phone: 0000000000</p>

        <h3>Skills</h3>
        <p id="r-skills">Your skills here</p>

        <h3>Education</h3>
        <p id="r-education">Your education here</p>

        <h3>Experience</h3>
        <p id="r-experience">Your experience here</p>
    </div>
</div>

<button onclick="printResume()">Print Resume</button>

<script src="script.js"></script>
</body>
</html>
